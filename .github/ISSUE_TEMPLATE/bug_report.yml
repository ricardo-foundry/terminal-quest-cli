name: Bug Report
description: Report a problem with Terminal Quest CLI
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! The more detail you provide, the faster we can fix it.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I have searched existing issues and this bug has not been reported yet.
          required: true
        - label: I am running the latest version of `terminal-quest-cli`.
          required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `terminal-quest --version` (or the value in package.json).
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - WSL
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.1"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal / Shell
      description: e.g. iTerm2 + zsh, Windows Terminal + PowerShell, GNOME Terminal + bash
      placeholder: "iTerm2 + zsh"

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal, numbered list that lets us reproduce the bug.
      placeholder: |
        1. Run `npx terminal-quest --lang en`
        2. Type `explore` at the prompt
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error message or stack trace if any.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste console output inside a code block, or attach a screenshot.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else we should know? Save file contents, custom theme, etc.
