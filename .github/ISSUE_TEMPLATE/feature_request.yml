name: Feature Request
description: Suggest a new idea, command, quest, or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an idea! Please describe the problem first, then the solution.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: This feature fits the scope of a terminal CLI adventure game.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or the missing capability.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work from a player's point of view?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Gameplay / Quests
        - Commands / CLI flags
        - Save & Load
        - i18n (languages)
        - Themes
        - Minigames
        - Docs
        - CI / Tooling
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, references to similar games, etc.
